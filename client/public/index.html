<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat - OpenClaw</title>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--primary:#6366f1;--primary-light:#eef2ff;--white:#fff;--gray-50:#f9fafb;--gray-200:#e5e7eb;--gray-400:#9ca3af;--gray-700:#374151;--radius:0.75rem}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;color:var(--gray-700)}
    .chat-app{max-width:800px;margin:0 auto;padding:20px;height:100vh;display:flex;flex-direction:column}
    .chat-header{background:var(--white);border-radius:var(--radius);padding:1rem 1.5rem;margin-bottom:1rem;box-shadow:0 4px 6px rgba(0,0,0,.1);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
    .chat-header h1{font-size:1.25rem}.status{font-size:.75rem;padding:.25rem .75rem;border-radius:9999px;background:#10b981;color:#fff}
    .chat-messages{flex:1;background:var(--white);border-radius:var(--radius);box-shadow:0 4px 6px rgba(0,0,0,.1);overflow:hidden;margin-bottom:1rem;min-height:0}
    .messages-wrapper{height:100%;overflow-y:auto;padding:1.5rem}
    .empty-state{text-align:center;padding:4rem 1rem;color:var(--gray-400)}
    .empty-icon{font-size:3rem;margin-bottom:1rem}
    .message-item{display:flex;gap:.75rem;margin-bottom:1.5rem;animation:fadeIn .3s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .message-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0;background:var(--gray-200)}
    .message-user .message-avatar{background:var(--primary-light)}
    .message-body{flex:1;min-width:0}
    .message-header{display:flex;justify-content:space-between;margin-bottom:.25rem}
    .message-role{font-size:.875rem;font-weight:600}.message-time{font-size:.75rem;color:var(--gray-400)}
    .message-content{background:var(--gray-50);padding:.75rem 1rem;border-radius:var(--radius);line-height:1.7;word-break:break-word;white-space:pre-wrap}
    .message-user .message-content{background:var(--primary-light)}
    .typing-dots{display:flex;gap:4px;padding:.75rem 1rem}
    .typing-dots span{width:8px;height:8px;border-radius:50%;background:var(--gray-400);animation:typing 1.4s infinite}
    .typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
    @keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-10px)}}
    .chat-input-area{background:var(--white);border-radius:var(--radius);padding:1rem;box-shadow:0 4px 6px rgba(0,0,0,.1);flex-shrink:0}
    .chat-input-wrapper{display:flex;gap:.75rem;align-items:flex-end}
    .chat-textarea{flex:1;padding:.75rem 1rem;border:2px solid var(--gray-200);border-radius:var(--radius);font-size:.95rem;font-family:inherit;resize:none;outline:none;max-height:150px;transition:border-color .2s}
    .chat-textarea:focus{border-color:var(--primary)}
    .send-button{padding:.75rem 1.25rem;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:1.1rem}.send-button:disabled{opacity:.5;cursor:not-allowed}
  </style>
</head>
<body>
  <div class="chat-app">
    <header class="chat-header">
      <h1>🦞 OpenClaw AI 助手</h1>
      <span class="status" id="status">在线</span>
    </header>
    <section class="chat-messages"><div class="messages-wrapper" id="messages"><div class="empty-state"><div class="empty-icon">💬</div><p>开始对话吧</p></div></div></section>
    <section class="chat-input-area">
      <div class="chat-input-wrapper">
        <textarea id="input" class="chat-textarea" placeholder="输入消息... (Enter发送)" rows="1" maxlength="4000"></textarea>
        <button id="sendBtn" class="send-button">➤</button>
      </div>
    </section>
  </div>

  <script type="module">
    const API = 'http://localhost:3000/api/v1/chat/messages';
    let conversationId = null;
    let isProcessing = false;

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const statusEl = document.getElementById('status');

    // 健康检查
    fetch('http://localhost:3000/health')
      .then(r => r.json())
      .then(d => {
        statusEl.textContent = d.modelAvailable ? '在线' : '离线';
        statusEl.style.background = d.modelAvailable ? '#10b981' : '#ef4444';
      })
      .catch(() => {
        statusEl.textContent = '离线';
        statusEl.style.background = '#ef4444';
      });

    function addMessage(role, content) {
      const empty = messagesEl.querySelector('.empty-state');
      if (empty) empty.remove();

      const div = document.createElement('div');
      div.className = `message-item message-${role}`;
      div.innerHTML = `
        <div class="message-avatar">${role === 'user' ? '👤' : '🦞'}</div>
        <div class="message-body">
          <div class="message-header">
            <span class="message-role">${role === 'user' ? '你' : 'OpenClaw'}</span>
            <span class="message-time">${new Date().toLocaleTimeString()}</span>
          </div>
          <div class="message-content">${escapeHtml(content).replace(/\n/g, '<br>')}</div>
        </div>
      `;
      messagesEl.appendChild(div);
      messagesEl.parentElement.scrollTop = messagesEl.parentElement.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message-item message-assistant';
      div.id = 'typing';
      div.innerHTML = '<div class="message-avatar">🦞</div><div class="message-body"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
      messagesEl.appendChild(div);
      messagesEl.parentElement.scrollTop = messagesEl.parentElement.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function sendMessage() {
      const message = inputEl.value.trim();
      if (!message || isProcessing) return;

      isProcessing = true;
      sendBtn.disabled = true;
      inputEl.disabled = true;

      addMessage('user', message);
      inputEl.value = '';
      inputEl.style.height = 'auto';
      showTyping();

      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, conversationId }),
        });

        const data = await res.json();

        if (!data.success) throw new Error(data.message);

        if (data.data.conversationId) conversationId = data.data.conversationId;
        hideTyping();
        addMessage('assistant', data.data.message.content);
      } catch (err) {
        hideTyping();
        addMessage('assistant', `❌ 错误: ${err.message}`);
      } finally {
        isProcessing = false;
        sendBtn.disabled = false;
        inputEl.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 150) + 'px';
    });
  </script>
</body>
</html>
