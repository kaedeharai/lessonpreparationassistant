<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能备课助手 - STEAM融合教育</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>📚 备课助手</h2>
      </div>
      <div class="sidebar-content" id="sidebarContent">
        <p style="color:var(--gray-400);text-align:center;padding:2rem">加载中...</p>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main" id="main">
      <div class="main-header">
        <button class="toggle-sidebar" id="toggleSidebar">☰</button>
        <h1 id="pageTitle">📖 开始新课程</h1>
      </div>
      <div class="main-content" id="mainContent">
        <!-- 欢迎页 -->
        <div class="welcome" id="welcome">
          <div class="welcome-icon">📖</div>
          <h2>欢迎使用智能备课助手</h2>
          <p>选择年级、学科和知识点，开始设计STEAM融合课程</p>
        </div>

        <!-- 结构标签页 -->
        <div class="structure-tabs" id="structureTabs" style="display:none;"></div>
        
        <!-- 内容区 -->
        <div class="content-area" id="contentArea" style="display:none;">
          <div class="generated-content" id="generatedContent"></div>
          <div class="chat-panel" id="chatPanel"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- 先加载配置 -->
  <script src="js/config.js"></script>
  <!-- 加载 md 文件渲染 -->
  <script src="js/markdown.js"></script>
  <!-- 再加载 API -->
  <script src="js/api.js"></script>
  <!-- 最后加载主应用 -->
  <script src="js/app.js"></script>
</body>
</html>
